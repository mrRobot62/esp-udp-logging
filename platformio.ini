[env]
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -I include
    ;-----------------------------------------------
    ; Enable WiFi logging and set UDP target for logs
    ;-----------------------------------------------
    -DWIFI_LOGGING_ENABLE=1
    -DWIFI_LOGGING_UDP_IP=\"192.168.0.249\"
    -DWIFI_LOGGING_UDP_PORT=10514
    -DCSV_OUT=1

    ;-----------------------------------------------
    ; Logging levels to enable (uncomment as needed)
    ;-----------------------------------------------
    -DCLIENTINFO
    -DCLIENTDBG
    -DCLIENTWARN
    -DCLIENTERR
    -DCLIENTRAW

[env:esp32dev]
platform = espressif32
board = esp32dev

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
